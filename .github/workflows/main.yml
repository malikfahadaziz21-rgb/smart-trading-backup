name: MQL5 Auto-Compile Check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Verify MT5 files
        run: |
          echo "=== MT5 contents ==="
          ls -lh MT5/
          echo "=== metaeditor64.exe size ==="
          du -sh MT5/metaeditor64.exe || echo "MISSING"
          echo "=== terminal64.exe size ==="
          du -sh MT5/terminal64.exe || echo "MISSING"
          echo "=== terminal.ini ==="
          cat MT5/config/terminal.ini || echo "MISSING"

      - name: Build Compiler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mql-compiler:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Create output directory
        run: mkdir -p /tmp/compiler-output

      - name: Run MQL5 Compilation
        run: |
          docker run --rm --network none \
            -v /tmp/compiler-output:/output \
            mql-compiler || true

      - name: Show logs
        if: always()
        run: |
          echo "=== build.log ==="
          cat /tmp/compiler-output/build.log 2>/dev/null \
            || echo "Not found"
          echo "=== metaeditor_wine.log ==="
          cat /tmp/compiler-output/metaeditor_wine.log 2>/dev/null \
            || echo "Not found"
          echo "=== terminal_wine.log ==="
          cat /tmp/compiler-output/terminal_wine.log 2>/dev/null \
            || echo "Not found"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/compiler-output/
          if-no-files-found: ignore
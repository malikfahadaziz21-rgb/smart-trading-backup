name: MQL5 Auto-Compile Check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: windows-latest    # ← native Windows, no Wine needed

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify MetaEditor exists
        run: |
          dir MT5\
          if (!(Test-Path "MT5\metaeditor64.exe")) {
            Write-Error "metaeditor64.exe not found"
            exit 1
          }
          Write-Host "MetaEditor found: $(Get-Item MT5\metaeditor64.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Create required MQL5 folders
        run: |
          New-Item -ItemType Directory -Force -Path "MT5\MQL5\Scripts"
          New-Item -ItemType Directory -Force -Path "MT5\MQL5\Experts"
          New-Item -ItemType Directory -Force -Path "MT5\MQL5\Indicators"
          New-Item -ItemType Directory -Force -Path "MT5\MQL5\Libraries"
          New-Item -ItemType Directory -Force -Path "MT5\MQL5\Logs"
          New-Item -ItemType Directory -Force -Path "MT5\logs"
          New-Item -ItemType Directory -Force -Path "MT5\config"

      - name: Stage script for compilation
        run: |
          Copy-Item "scripts\test_script.mq5" "MT5\MQL5\Scripts\test_script.mq5" -Force
          Write-Host "Script staged successfully"

      - name: Run MetaEditor compilation
        run: |
          $metaeditor = "${{ github.workspace }}\MT5\metaeditor64.exe"
          $script     = "${{ github.workspace }}\MT5\MQL5\Scripts\test_script.mq5"
          $log        = "${{ github.workspace }}\MT5\MQL5\Logs\build.log"

          Write-Host "Compiling: $script"
          Write-Host "Log output: $log"

          $process = Start-Process -FilePath $metaeditor `
            -ArgumentList "/compile:`"$script`"", "/log:`"$log`"", "/portable" `
            -Wait -PassThru -NoNewWindow

          Write-Host "MetaEditor exit code: $($process.ExitCode)"

          # Give it a moment to flush the log
          Start-Sleep -Seconds 5

      - name: Parse and display build log
        run: |
          $logPath = "${{ github.workspace }}\MT5\MQL5\Logs\build.log"

          # Also check next to the script as fallback
          $altLog  = "${{ github.workspace }}\MT5\MQL5\Scripts\test_script.log"

          if (Test-Path $logPath) {
            Write-Host "Log found at: $logPath"
          } elseif (Test-Path $altLog) {
            Write-Host "Log found at: $altLog"
            $logPath = $altLog
          } else {
            Write-Host "Searching for any log files..."
            Get-ChildItem -Path "MT5\" -Recurse -Filter "*.log" | Select-Object FullName
            Write-Error "No build log found — MetaEditor did not compile"
            exit 1
          }

          # MetaEditor writes UTF-16LE — decode it
          $bytes   = [System.IO.File]::ReadAllBytes($logPath)
          $content = [System.Text.Encoding]::Unicode.GetString($bytes)

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━ COMPILATION LOG ━━━━━━━━━━━━━━━━━━━━"
          Write-Host $content
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if ($content -match "0 error") {
            Write-Host "✅ RESULT: COMPILATION SUCCEEDED"
            exit 0
          } else {
            Write-Host "❌ RESULT: COMPILATION FAILED"
            exit 1
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: MT5\MQL5\Logs\build.log
          if-no-files-found: ignore
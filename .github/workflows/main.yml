name: MQL5 Auto-Compile Check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Verify MT5 files before build
        run: |
          echo "=== MT5 folder contents ==="
          ls -lh MT5/
          echo "=== MetaEditor64 size check ==="
          du -sh MT5/MetaEditor64.exe || echo "ERROR: MetaEditor64.exe is missing"

      - name: Build Compiler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mql-compiler:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # --network none blocks MetaEditor's auto-update check at runtime
      # winetricks already ran at build time so no network needed here
      - name: Run MQL5 Compilation
        run: |
          # Run container and copy logs out regardless of exit code
          docker run --rm --network none \
            -v /tmp/compiler-output:/output \
            mql-compiler || true
          
      - name: Copy logs from container
        if: always()
        run: |
          # Logs are in /compiler/MT5/ inside container
          # We mount /output volume to get them out
          docker run --rm --network none \
            -v /tmp/compiler-output:/output \
            --entrypoint bash \
            mql-compiler -c "cp /compiler/MT5/*.log /output/ 2>/dev/null || true"
          ls -la /tmp/compiler-output/ || echo "No output files"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/compiler-output/
          if-no-files-found: ignore

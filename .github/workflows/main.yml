name: MQL5 Auto-Compile Check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (required for cache-to/cache-from) ─────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Cache Wine install layer ────────────────────────────────────────
      # The cache key is tied to the Dockerfile so it invalidates automatically
      # when you change the Dockerfile.
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── 4. Build Docker image (uses cache on subsequent pushes) ────────────
      - name: Build Compiler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mql-compiler:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevents cache from growing forever
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── 5. Run compilation ─────────────────────────────────────────────────
      - name: Run MQL5 Compilation
        run: docker run --rm mql-compiler

      # ── 6. Upload build.log as artifact (visible even on failure) ──────────
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
          if-no-files-found: ignore
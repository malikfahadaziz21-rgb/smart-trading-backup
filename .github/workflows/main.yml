name: MQL5 Auto-Compile Check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true             # critical — downloads actual LFS files not pointers

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Verify MT5 files before build
        run: |
          echo "=== MT5 folder contents ==="
          ls -lh MT5/
          echo "=== MetaEditor64 size check ==="
          du -sh MT5/MetaEditor64.exe || echo "ERROR: MetaEditor64.exe is missing"
          echo "=== MQL5 folder ==="
          ls -lh MT5/MQL5/ || echo "ERROR: MQL5 folder missing"

      - name: Build Compiler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mql-compiler:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run MQL5 Compilation
        run: docker run --rm mql-compiler

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
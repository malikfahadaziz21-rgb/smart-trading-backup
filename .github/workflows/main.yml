name: MQL5 Auto-Compile Check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Verify MT5 files before build
        run: |
          echo "=== MT5 root files ==="
          ls -lh MT5/
          echo "=== MQL5 Include check ==="
          ls MT5/MQL5/Include/ | head -10 || echo "Include folder missing or empty"
          echo "=== Total file count in MT5 ==="
          find MT5/ -type f | wc -l

      - name: Build Compiler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mql-compiler:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Create output directory
        run: mkdir -p /tmp/compiler-output

      - name: Run MQL5 Compilation
        run: |
          docker run --rm --network none \
            -v /tmp/compiler-output:/output \
            mql-compiler || true

      - name: Show output directory contents
        if: always()
        run: |
          echo "=== Files in output dir ==="
          ls -la /tmp/compiler-output/ || echo "Empty"
          echo "=== wine_debug.log ==="
          cat /tmp/compiler-output/wine_debug.log 2>/dev/null || echo "Not found"
          echo "=== build.log ==="
          cat /tmp/compiler-output/build.log 2>/dev/null || echo "Not found"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/compiler-output/
          if-no-files-found: ignore